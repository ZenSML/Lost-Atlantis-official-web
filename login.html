<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Atlantis | Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- TOP BAR --- */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #111;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-brand img {
            height: 30px;
            filter: invert(1);
            mix-blend-mode: screen;
        }
        .topbar-brand .brand-name {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #fff;
            opacity: 0.85;
        }

        /* --- LOADING OVERLAY --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .loader-icon {
            width: 30px;
            height: 30px;
            border: 1px solid #222;
            border-top: 1px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- LOGIN FORM --- */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px 40px;
        }

        .login-card {
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .login-title {
            font-size: 12px;
            letter-spacing: 8px;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid #222;
            color: #fff;
            margin-bottom: 15px;
            font-size: 10px;
            letter-spacing: 3px;
            text-align: center;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .login-input:focus { border-color: #444; }
        .login-input::placeholder { color: #333; }

        .login-error {
            color: #ff4444;
            font-size: 9px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: none;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 5px;
            font-size: 10px;
            text-transform: uppercase;
            transition: all 0.4s;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
        }
        .login-btn:hover { background: #fff; color: #000; }

        /* --- SOCIAL LOGIN --- */
        .social-divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #222;
            font-size: 8px;
            letter-spacing: 4px;
        }
        .social-divider::before, .social-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #111;
        }
        .social-divider span { padding: 0 15px; }

        .social-btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .social-btn {
            width: 100%;
            padding: 14px;
            background: #080808;
            border: 1px solid #111;
            color: #888;
            font-size: 9px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
        }
        .social-btn:hover { border-color: #333; color: #fff; background: #111; }
        .social-btn img { height: 14px; filter: grayscale(1) brightness(0.8); }
        .social-btn:hover img { filter: none; }

        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #111 inset !important;
            -webkit-text-fill-color: white !important;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-icon"></div>
        <p style="font-size: 8px; letter-spacing: 6px; color: #444;">LOADING</p>
    </div>

    <div class="topbar">
        <div class="topbar-brand">
            <img src="logo.png" alt="LA">
            <span class="brand-name">Lost Atlantis</span>
        </div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <h2 class="login-title">LOG IN</h2>
            <input type="text" id="username" placeholder="ENTER USERNAME" class="login-input">
            <input type="email" id="email" placeholder="ENTER EMAIL" class="login-input">
            <input type="password" id="pass" placeholder="PASSWORD" class="login-input">
            <p id="login-error" class="login-error"></p>
            <button onclick="doLogin()" class="login-btn">LOG IN</button>
            
            <div class="social-divider"><span>OR</span></div>
            
            <div class="social-btn-container">
                <button onclick="socialLogin('google')" class="social-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G"> GOOGLE
                </button>
            </div>
            <p onclick="enterGuestMode()" style="font-size: 8px; letter-spacing: 3px; color: #444; margin-top: 25px; cursor: pointer;">GUEST MODE</p>
            <p style="font-size: 8px; letter-spacing: 3px; color: #222; margin-top: 15px;">SIGN UP? <span onclick="window.location.href='register.html'" style="color: #666; cursor: pointer;">REGISTER</span></p>
            <p onclick="window.location.href='contact.html'" style="font-size: 7px; letter-spacing: 4px; color: #1a1a1a; margin-top: 30px; cursor: pointer;"><span style="margin-right: 5px;">ⓘ</span> CONTACT SUPPORT</p>
        </div>
    </div>
    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"></script>
    <script>
        // Make Firestore and Auth globally available
        window.db = firebase.firestore();
        window.auth = firebase.auth();
        console.log("Firebase initialized and connected to the mainframe.");
    </script>
    <script src="config.js"></script>
    <script src="firebase-init.js"></script>

    <script>
        async function socialLogin(providerName) {
            let provider;
            if (providerName === 'google') provider = new firebase.auth.GoogleAuthProvider();

            document.getElementById('loading-overlay').style.display = 'flex';
            
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                // Save to waitlist if new
                await db.collection('waitlist').doc(user.uid).set({
                    user: user.displayName || 'GUEST',
                    email: user.email.toLowerCase(),
                    date: new Date().toLocaleDateString(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('la_role', 'member');
                window.location.href = 'shop.html';
            } catch (error) {
                console.error("Social Login Error:", error);
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('login-error').innerText = "CONNECTION FAILED.";
                document.getElementById('login-error').style.display = "block";
            }
        }
        function enterGuestMode() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('la_role', 'guest');
            window.location.href = 'shop.html';
        }

        async function doLogin() {
            const userInput = document.getElementById('username').value.trim();
            const emailInput = document.getElementById('email').value.trim();
            const passInput = document.getElementById('pass').value;
            const errorEl = document.getElementById('login-error');

            errorEl.style.display = 'none';

            if(!userInput || !emailInput || !passInput) {
                errorEl.textContent = 'ALL FIELDS REQUIRED.';
                errorEl.style.display = 'block';
                return;
            }

            // Show Loading
            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                // Admin check
                if(emailInput.toLowerCase() === "la.lostatlantis@gmail.com" && passInput === "atlantis2026") {
                    localStorage.setItem('la_role', 'admin');
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'admin.html';
                    return;
                }

                // Member check via Firestore
                const waitlistRef = db.collection('waitlist');
                const snapshot = await waitlistRef
                    .where('email', '==', emailInput.toLowerCase())
                    .where('user', '==', userInput)
                    .get();

                if(!snapshot.empty) {
                    // Check password if stored (assuming standard waitlist doesn't enforce pass yet, but let's allow entry)
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('la_role', 'member');
                    window.location.href = 'shop.html';
                } else {
                    document.getElementById('loading-overlay').style.display = 'none';
                    errorEl.textContent = 'ACCOUNT NOT FOUND. PLEASE REGISTER.';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                console.error("Login Error:", err);
                document.getElementById('loading-overlay').style.display = 'none';
                errorEl.textContent = 'SYSTEM ERROR. TRY AGAIN LATER.';
                errorEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
