<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Atlantis | Restricted Access</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="entry-portal" id="main-portal">
        <div class="map-box" style="background: transparent; border: none;">
            <img src="map.png" alt="Map of Lost Atlantis" class="brand-map" style="filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));">
        </div>
        
        <h1 class="brand-title">Lost Atlantis</h1>

        <div style="width: 100%;">
            <button onclick="openWaitlist()" class="btn-enter">JOIN THE LOST ATLANTIS</button>
            <p style="font-size: 8px; letter-spacing: 4px; color: #444; margin-top: 15px; text-transform: uppercase;">Status: Coordinates Locked</p>
        </div>
    </div>

    <!-- CONTACT LINK -->
    <a href="https://mail.google.com/mail/?view=cm&fs=1&to=la.lostatlantis@gmail.com" target="_blank" class="contact-link">
        <span style="font-size: 16px; margin-right: 8px;">ⓘ</span> CONTACT
    </a>

    <!-- WAITLIST MODAL -->
    <div class="modal-overlay" id="waitlist-modal">
        <div class="modal-content">
            <div id="form-container">
                <h2 style="font-size: 14px; letter-spacing: 8px; margin-bottom: 40px; font-weight: 300;">THE WAITING LIST</h2>
                <input type="text" id="w-user" placeholder="USERNAME" class="blueprint-input">
                <input type="email" id="w-email" placeholder="EMAIL ADDRESS" class="blueprint-input">
                <input type="password" id="w-pass" placeholder="PASSWORD" class="blueprint-input">
                <button onclick="joinWaitlist()" class="btn-enter" style="margin-top: 10px;">JOIN THE WAITING LIST</button>
                <p onclick="closeWaitlist()" style="font-size: 9px; letter-spacing: 3px; color: #444; margin-top: 30px; cursor: pointer;">CANCEL</p>
            </div>
            <div class="success-message" id="success-message">
                <h2 style="font-size: 24px; letter-spacing: 10px; margin-bottom: 20px;">TRANSMISSION SECURED</h2>
                <p style="font-size: 10px; letter-spacing: 4px; color: #666; line-height: 2;">WE WILL SIGNAL YOU ONCE THE GATES ARE LIVE.</p>
                <button onclick="window.location.reload()" class="btn-enter" style="margin-top: 40px; width: auto; padding: 15px 40px;">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, starGroup;

        function createIconTexture(text, isStickman = false) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = isStickman ? 512 : 2048; // Square for stickman, wide for text
            canvas.height = isStickman ? 512 : 256;
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (isStickman) {
                // Draw massive bold minimalist stickman
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 30; // Very thick for square canvas
                ctx.lineCap = 'round';
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                
                ctx.beginPath();
                ctx.arc(cx, cy - 100, 50, 0, Math.PI * 2); // Massive Head
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(cx, cy - 50); ctx.lineTo(cx, cy + 100); // Body
                ctx.moveTo(cx - 80, cy); ctx.lineTo(cx + 80, cy); // Wide Arms
                ctx.moveTo(cx, cy + 100); ctx.lineTo(cx - 80, cy + 200); // L-Leg
                ctx.moveTo(cx, cy + 100); ctx.lineTo(cx + 80, cy + 200); // R-Leg
                ctx.stroke();
            } else {
                ctx.font = '900 80px Inter, sans-serif';
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.letterSpacing = '15px';
                ctx.fillText(text.toUpperCase(), canvas.width / 2, canvas.height / 2);
            }
            
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            starGroup = new THREE.Group();
            scene.add(starGroup);

            // Add background points
            const starGeometry = new THREE.BufferGeometry();
            const starVertices = [];
            for (let i = 0; i < 4000; i++) {
                const r = 5 + Math.random() * 10;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                starVertices.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0x444444, size: 0.015 });
            const stars = new THREE.Points(starGeometry, starMaterial);
            starGroup.add(stars);

            // Icons: LOST ATLANTIS, LA, AN ISLAND, ?, Stickman, and more
            const labels = ["LOST ATLANTIS", "LA", "AN ISLAND", "?", "FOUNDATION", "ABYSS", "SYSTEM", "STICKMAN"];
            const logoFiles = ["logo-cursive.png", "logo.png"];
            const textureLoader = new THREE.TextureLoader();

            // Add Text Labels & Stickman
            labels.forEach((text, i) => {
                const isStickman = (text === "STICKMAN");
                const texture = createIconTexture(text, isStickman);
                const material = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(material);
                const angle = (i / labels.length) * Math.PI * 2;
                const radius = 12;
                sprite.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 5, Math.sin(angle) * radius);
                
                if(isStickman) {
                    sprite.scale.set(1.5, 1.5, 1); // Large Square Scale
                } else {
                    sprite.scale.set(6, 0.75, 1);
                }
                starGroup.add(sprite);
            });

            // Add Image Logos
            logoFiles.forEach((file, i) => {
                const texture = textureLoader.load(file);
                const material = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(material);
                const angle = ((i + 0.5) / logoFiles.length) * Math.PI * 2;
                const radius = 10;
                sprite.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 2, Math.sin(angle) * radius);
                sprite.scale.set(2, 2, 1); // Square/Large scale for logos
                starGroup.add(sprite);
            });

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            starGroup.rotation.y += 0.002;
            starGroup.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }

        // Waitlist Logic
        function openWaitlist() {
            document.getElementById('waitlist-modal').style.display = 'flex';
            document.getElementById('main-portal').style.opacity = '0.2';
        }

        function closeWaitlist() {
            document.getElementById('waitlist-modal').style.display = 'none';
            document.getElementById('main-portal').style.opacity = '1';
        }

        function joinWaitlist() {
            const user = document.getElementById('w-user').value;
            const email = document.getElementById('w-email').value;
            const pass = document.getElementById('w-pass').value;

            if(!user || !email || !pass) return alert("All fields required.");

            // Save to localStorage (Simulating backend)
            const waitlist = JSON.parse(localStorage.getItem('la_waitlist')) || [];
            waitlist.push({ user, email, date: new Date().toLocaleDateString() });
            localStorage.setItem('la_waitlist', JSON.stringify(waitlist));

            // Show Success
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
        }

        init();
    </script>
</body>
</html>
